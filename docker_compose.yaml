version: "3.9"
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: micro-flask:latest
    env_file:
      - .env
    ports:
      - "${PORT:-8000}:8000"
    # Reinforce non-root at runtime (matches Dockerfile UID:GID)
    user: "10001:10001"
    # Optional: repeat healthcheck
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os,urllib.request,sys;port=os.getenv('PORT','8000'); sys.exit(0) if urllib.request.urlopen(f'http://127.0.0.1:{port}/healthz',timeout=2).getcode()==200 else sys.exit(1)\""]
      interval: 30s
      timeout: 3s
      retries: 3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
